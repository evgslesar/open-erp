<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: {
          primary: { DEFAULT: '#1E40AF', dark: '#1E3A8A' },
          accent: '#F59E0B',
        },
        fontFamily: { sans: ['Fira Sans', 'sans-serif'] },
      }}
    }
  </script>
  <title>Вход — Open ERP</title>
  <style>body { font-family: 'Fira Sans', sans-serif; }</style>
</head>
<body class="bg-primary-dark min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-accent mb-4">
        <svg class="w-8 h-8 text-primary-dark" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
        </svg>
      </div>
      <h1 class="text-xl font-semibold text-white">Open ERP</h1>
      <p class="text-sm text-white/60 mt-1">Войдите, чтобы продолжить</p>
    </div>

    {% if error %}
    <div class="bg-red-500/20 border border-red-400/30 text-red-200 text-sm rounded-lg px-4 py-3 mb-4">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login?next={{ next }}" class="bg-white rounded-xl shadow-xl p-6 space-y-4">
      <label class="block">
        <span class="text-sm font-medium text-slate-700">Email</span>
        <input type="email" name="email" required autofocus
               value="admin@example.local"
               class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-shadow">
      </label>
      <label class="block">
        <span class="text-sm font-medium text-slate-700">Пароль</span>
        <input type="password" name="password" required
               class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-shadow">
      </label>
      <button type="submit"
              class="w-full bg-primary hover:bg-primary-dark text-white font-medium py-2.5 rounded-lg transition-colors">
        Войти
      </button>
    </form>
  </div>
</body>
</html>
