{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-16">
  <div class="bg-surface-card border border-surface-border rounded-xl p-8 text-center">
    <div class="w-12 h-12 rounded-full bg-red-100 text-red-500 flex items-center justify-center mx-auto mb-4">
      <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>
    </div>
    <h2 class="text-lg font-semibold text-slate-700 mb-2">Операция невозможна</h2>
    <p class="text-sm text-slate-500 mb-6">{{ message }}</p>
    <a href="/" class="inline-block px-5 py-2 border border-surface-border text-slate-600 text-sm font-medium rounded-lg hover:bg-slate-50 transition-colors">
      На главную
    </a>
  </div>
</div>
{% endblock %}
